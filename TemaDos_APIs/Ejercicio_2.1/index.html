<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Receta</title>
    <style>
        .card { border: 2px solid #2ecc71; border-radius: 10px; padding: 20px; width: 300px; font-family: sans-serif; }
        .precio { color: #e67e22; font-weight: bold; font-size: 1.2em; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>

    <div id="taco-card" class="card">
        <h1 id="taco-nombre">Cargando...</h1>
        <p class="precio">Precio: <span id="taco-precio">0</span></p>
        <h3>Acompañamientos:</h3>
        <ul id="lista-acompañamientos"></ul>
    </div>

    <script>
        const taco = {
            nombre: "Taco al pastor",
            precio: 25,
            ingredientes: {
                proteina: {
                    nombre: "Cerdo"
                },
                acompañamientos: [
                    {
                        nombre: "Cebolla",
                        ingredientes: ["Cebolla blanca", "Cilantro"]
                    },
                    {
                        nombre: "Guacamole",
                        ingredientes: ["Aguacate", "Limón", "Sal", "Cebolla", "Chile"]
                    }
                ]
            }
        };

        //  Nombre en el h1
        document.getElementById("taco-nombre").textContent = taco.nombre;

        //  Precio con formato de moneda
        document.getElementById("taco-precio").textContent = "$" + taco.precio;

        //  Acompañamientos y crear <li> para cada uno
        const lista = document.getElementById("lista-acompañamientos");

        taco.ingredientes.acompañamientos.forEach(item => {
            const li = document.createElement("li");
            li.textContent = item.nombre;
            lista.appendChild(li);
        });
    </script>

</body>
</html>
